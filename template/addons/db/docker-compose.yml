services:
  db:
    image: mysql:8.0
    container_name: node-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      # Mount init.sql to auto-initialize the database
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist data even if container is deleted
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: