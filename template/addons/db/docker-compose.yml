version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: api_forgex_db
    restart: always
    ports:
      - "${DB_PORT}:3306"
    environment:
      # Use variables from .env file to initialize the database
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: